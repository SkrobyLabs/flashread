<!doctype html>
<html data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>FlashRead</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #15171c; --fg: #e7e9ee; --btn: #232730; --btn-hover: #2e333e;
        --ghost-hover: #1d2027; --muted: #6b7280; --border: #2a2e37;
      }
      [data-theme="light"] {
        color-scheme: light;
        --bg: #ffffff; --fg: #15171c; --btn: #eef0f4; --btn-hover: #e3e6ec;
        --ghost-hover: #f0f1f4; --muted: #9aa1ad; --border: #e3e5ea;
      }
      body {
        width: 240px;
        margin: 0;
        padding: 12px;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .hdr { font-size: 15px; font-weight: 700; margin: 2px 4px 12px; }
      .act {
        all: unset;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 11px 12px;
        margin-bottom: 8px;
        background: var(--btn);
        border-radius: 9px;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.12s;
      }
      .act:hover { background: var(--btn-hover); }
      .act:disabled { opacity: 0.45; cursor: default; }
      .act.ghost { background: transparent; }
      .act.ghost:hover { background: var(--ghost-hover); }
      .ic { font-size: 16px; width: 18px; text-align: center; }
      .msg { min-height: 16px; margin: 4px 4px 0; font-size: 12px; color: #e0a44a; }
      .hint {
        margin: 8px 4px 2px;
        font-size: 11px;
        color: var(--muted);
        border-top: 1px solid var(--border);
        padding-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="hdr">⚡ FlashRead</div>
    <button class="act" id="sel"><span class="ic">⚡</span><span>Speed-read selection</span></button>
    <button class="act" id="clip"><span class="ic">📋</span><span>Speed-read clipboard</span></button>
    <button class="act ghost" id="opts"><span class="ic">⚙</span><span>Settings</span></button>
    <div class="msg" id="msg"></div>
    <div class="hint">Or select text on a page, then right-click, click the ⚡ icon, or press Ctrl/Cmd+Shift+Y.</div>
    <script src="popup.js"></script>
  </body>
</html>
